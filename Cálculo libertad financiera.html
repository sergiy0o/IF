<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculadora FIRE</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Inter,system-ui,sans-serif;
    }

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top left,#1e3a8a 0%,transparent 25%),
        radial-gradient(circle at bottom right,#0f766e 0%,transparent 25%),
        #020617;
      color:white;
      padding:40px;
    }

    .container{
      max-width:1200px;
      margin:auto;
    }

    .hero{
      text-align:center;
      margin-bottom:40px;
    }

    .hero h1{
      font-size:4rem;
      font-weight:900;
      background:linear-gradient(90deg,#60a5fa,#2dd4bf);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .hero p{
      margin-top:10px;
      color:#cbd5e1;
      font-size:1.1rem;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:25px;
      margin-bottom:35px;
    }

    .card{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(10px);
      border-radius:24px;
      padding:30px;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    .card h2{
      margin-bottom:20px;
      font-size:1.3rem;
    }

    .input-group{
      margin-bottom:18px;
    }

    .input-group label{
      display:block;
      margin-bottom:8px;
      color:#cbd5e1;
    }

    .input-group input{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      background:#0f172a;
      color:white;
      font-size:1rem;
      outline:none;
      border:1px solid rgba(255,255,255,0.08);
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:16px;
      font-size:1rem;
      font-weight:700;
      cursor:pointer;
      background:linear-gradient(90deg,#2563eb,#14b8a6);
      color:white;
      transition:0.3s;
    }

    button:hover{
      transform:translateY(-2px);
      opacity:0.95;
    }

    .results{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-top:10px;
    }

    .result-card{
      background:rgba(255,255,255,0.05);
      border-radius:20px;
      padding:25px;
      text-align:center;
      border:1px solid rgba(255,255,255,0.08);
    }

    .result-title{
      color:#94a3b8;
      margin-bottom:10px;
    }

    .result-value{
      font-size:2rem;
      font-weight:800;
      color:#2dd4bf;
    }

    .chart-container{
      margin-top:35px;
      background:rgba(255,255,255,0.05);
      border-radius:30px;
      padding:30px;
      border:1px solid rgba(255,255,255,0.08);
    }

    footer{
      text-align:center;
      margin-top:40px;
      color:#94a3b8;
      font-size:0.9rem;
    }

  </style>
</head>
<body>

<div class="container">

  <div class="hero">
    <h1>FIRE Calculator</h1>
    <p>Calculadora de independencia financiera</p>
  </div>

  <div class="grid">

    <div class="card">

      <h2>Datos de entrada</h2>

      <div class="input-group">
        <label>Edad actual</label>
        <input type="number" id="age" value="34">
      </div>

      <div class="input-group">
        <label>Capital inicial (€)</label>
        <input type="number" id="initial" value="50000">
      </div>

      <div class="input-group">
        <label>Aportación mensual (€)</label>
        <input type="number" id="monthly" value="720">
      </div>

      <div class="input-group">
        <label>Renta mensual deseada (€)</label>
        <input type="number" id="desired" value="2000">
      </div>

      <button onclick="calculate()">
        Calcular independencia financiera
      </button>

    </div>

    <div class="card">

      <h2>Resultados</h2>

      <div class="results">

        <div class="result-card">
          <div class="result-title">Capital objetivo</div>
          <div class="result-value" id="targetCapital">-</div>
        </div>

        <div class="result-card">
          <div class="result-title">Años estimados</div>
          <div class="result-value" id="yearsNeeded">-</div>
        </div>

        <div class="result-card">
          <div class="result-title">Edad FIRE</div>
          <div class="result-value" id="fireAge">-</div>
        </div>

      </div>

    </div>

  </div>

  <div class="chart-container">
    <canvas id="chart"></canvas>
  </div>

  <footer>
    Suposiciones:
    rentabilidad real anual 8% • retirada segura 3.5%
  </footer>

</div>

<script>

  let chart;

  function calculate(){

    const age = parseInt(document.getElementById('age').value);
    const initial = parseFloat(document.getElementById('initial').value);
    const monthly = parseFloat(document.getElementById('monthly').value);
    const desired = parseFloat(document.getElementById('desired').value);

    const annualReturn = 0.08;
    const withdrawalRate = 0.035;

    const annualDesired = desired * 12;
    const target = annualDesired / withdrawalRate;

    let capital = initial;
    let years = 0;

    const labels = [];
    const values = [];

    const maxAge = 65;

    let fireReached = false;

    while((age + years) <= maxAge){

    labels.push(age + years);
    values.push(Math.round(capital));

    if(!fireReached && capital >= target){
        fireReached = true;
    }

    if(!fireReached){

        // Fase acumulación
        capital =
        capital * (1 + annualReturn) +
        (monthly * 12);

    } else {

        // Fase retiro
        capital =
        capital * (1 + annualReturn) -
        annualDesired;
    }

    years++;
    }

    document.getElementById('targetCapital').innerText =
      Math.round(target).toLocaleString('es-ES') + '€';

    document.getElementById('yearsNeeded').innerText =
      years + ' años';

    document.getElementById('fireAge').innerText =
      (age + years) + ' años';

    renderChart(labels, values, target);

  }

  function renderChart(labels, values, target){

    const ctx = document.getElementById('chart');

    if(chart){
      chart.destroy();
    }

    chart = new Chart(ctx, {

      type: 'line',

      data: {

        labels: labels,

        datasets: [

          {
            label: 'Patrimonio (€)',
            data: values,
            borderWidth: 4,
            tension: 0.35,
            fill: true
          },

          {
            label: 'Objetivo FIRE',
            data: Array(labels.length).fill(target),
            borderDash: [10,10],
            borderWidth: 2,
            pointRadius: 0
          }

        ]
      },

      options: {

        responsive:true,

        plugins:{
          legend:{
            labels:{
              color:'white'
            }
          }
        },

        scales:{

          x:{
            ticks:{
              color:'#cbd5e1'
            },
            grid:{
              color:'rgba(255,255,255,0.05)'
            }
          },

          y:{
            ticks:{
              color:'#cbd5e1'
            },
            grid:{
              color:'rgba(255,255,255,0.05)'
            }
          }

        }

      }

    });

  }

  calculate();

</script>

</body>
</html>
